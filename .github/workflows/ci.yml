name: CI/CD Pipeline - CSharpQuizWPF

on:
  push:
    branches: [ "master" ]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_FILE: 'CSharpQuizWPF.slnx'
  TEST_PROJECT: 'CSharpQuizWPF.Tests/CSharpQuizWPF.Tests.csproj'
  COVERAGE_THRESHOLD: 70 
  
jobs:
  build-and-analyze:
    name: Сборка, Тесты и Покрытие
    runs-on: windows-latest

    steps:
    - name: Получение кода
      uses: actions/checkout@v4

    - name: Настройка .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Восстановление зависимостей
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Сборка решения
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

    - name: Запуск тестов с покрытием
      # ВАЖНО: аргументы для DataCollector передаются через --
      run: >
        dotnet test CSharpQuizWPF.Tests/CSharpQuizWPF.Tests.csproj
        --collect:"XPlat Code Coverage"
        --results-directory ./test-results
        --
        DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.IncludeTestAssembly=true

    - name: Диагностика (поиск файла)
      if: always()
      run: |
        Write-Host "Поиск файлов в test-results:"
        Get-ChildItem -Path ./test-results -Recurse -File | Format-Table FullName, Length
        Write-Host "Поиск файлов cobertura.xml:"
        Get-ChildItem -Path . -Filter *.cobertura.xml -Recurse | Format-Table FullName, Length

    - name: Копирование отчёта в корень
      run: |
        $report = Get-ChildItem -Path . -Filter coverage.cobertura.xml -Recurse | Select-Object -First 1
        if ($report) {
          Copy-Item $report.FullName -Destination ./coverage.xml
          Write-Host "Отчёт найден: $($report.FullName)"
        } else {
          Write-Error "Отчёт о покрытии не найден. Проверьте диагностику выше."
          exit 1
        }

    - name: Установка ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Генерация HTML-отчёта
      run: reportgenerator -reports:./coverage.xml -targetdir:./coverage-report -reporttypes:HtmlSummary

    - name: Проверка порога покрытия (Threshold Check)
      run: |
        $summary = Get-Content ./coverage-report/Summary.json | ConvertFrom-Json
        $lineCoverage = $summary.Summary.LineCoverage
        Write-Host "Текущее покрытие строк: $lineCoverage%"
        $threshold = [int]${{ env.COVERAGE_THRESHOLD }}
        if ($lineCoverage -lt $threshold) {
          Write-Error "ОШИБКА: Покрытие ($lineCoverage%) ниже порога ($threshold%). Пайплайн завершён с ошибкой."
          exit 1
        } else {
          Write-Host "Покрытие соответствует порогу."
        }

    - name: Сохранение артефактов
      uses: actions/upload-artifact@v4
      with:
        name: Quality-Reports
        path: |
          ./coverage-report/
          CSharpQuizWPF/bin/Release/net472/
        retention-days: 7