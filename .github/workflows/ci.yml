name: CI/CD Pipeline - CSharpQuizWPF

on:
  push:
    branches: [ "master" ]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_FILE: 'CSharpQuizWPF.slnx'
  TEST_PROJECT: 'CSharpQuizWPF.Tests/CSharpQuizWPF.Tests.csproj'
  COVERAGE_THRESHOLD: 70 
  
jobs:
  build-and-analyze:
    name: Сборка, Тесты и Покрытие
    runs-on: windows-latest

    steps:
    - name: Получение кода
      uses: actions/checkout@v4

    - name: Настройка .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Восстановление зависимостей
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Сборка решения
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

    - name: Запуск тестов с покрытием (через MSBuild)
      # Используем /p:CollectCoverage вместо --collect
      run: >
        dotnet test CSharpQuizWPF.Tests/CSharpQuizWPF.Tests.csproj
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=cobertura
        /p:CoverletOutput=./test-results/coverage
        --no-build
        --verbosity normal

    - name: Диагностика (поиск файла)
      if: always()
      run: |
        Write-Host "🔍 Все файлы *.xml в репозитории:"
        Get-ChildItem -Path . -Filter *.xml -Recurse | ForEach-Object { Write-Host $_.FullName }
        Write-Host "`n🔍 Содержимое папки test-results:"
        if (Test-Path ./test-results) {
          Get-ChildItem -Path ./test-results -Recurse | ForEach-Object { Write-Host $_.FullName }
        } else {
          Write-Host "Папка test-results не найдена"
        }

    - name: Копирование отчёта в корень
      run: |
        $report = Get-ChildItem -Path . -Filter *coverage*.xml -Recurse | 
                  Where-Object { $_.Name -match "coverage.*\.xml$" } | 
                  Select-Object -First 1
        
        if ($report) {
          Copy-Item $report.FullName -Destination ./coverage.xml
          Write-Host "✅ Отчёт найден: $($report.FullName)"
        } else {
          Write-Error "❌ Отчёт о покрытии не найден. Проверьте диагностику выше."
          exit 1
        }

    - name: Установка ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Генерация HTML-отчёта
      run: reportgenerator -reports:./coverage.xml -targetdir:./coverage-report -reporttypes:HtmlSummary

    - name: Проверка порога покрытия (Threshold Check)
      run: |
        if (Test-Path ./coverage-report/Summary.json) {
          $summary = Get-Content ./coverage-report/Summary.json | ConvertFrom-Json
          $lineCoverage = $summary.Summary.LineCoverage
          Write-Host "📊 Текущее покрытие строк: $lineCoverage%"
          $threshold = [int]${{ env.COVERAGE_THRESHOLD }}
          if ($lineCoverage -lt $threshold) {
            Write-Error "⛔ ОШИБКА: Покрытие ($lineCoverage%) ниже порога ($threshold%). Пайплайн завершён с ошибкой."
            exit 1
          } else {
            Write-Host "✅ Покрытие соответствует порогу."
          }
        } else {
          Write-Error "Файл Summary.json не найден."
          exit 1
        }

    - name: Сохранение артефактов
      uses: actions/upload-artifact@v4
      with:
        name: Quality-Reports
        path: |
          ./coverage-report/
          CSharpQuizWPF/bin/Release/net472/
        retention-days: 7