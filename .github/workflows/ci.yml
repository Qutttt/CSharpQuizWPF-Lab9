name: CI/CD Pipeline - CSharpQuizWPF

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_FILE: 'CSharpQuizWPF.slnx'

jobs:
  build-and-analyze:
    name: Сборка и анализ качества
    runs-on: windows-latest

    steps:
    - name: Получение кода
      uses: actions/checkout@v4

    - name: Настройка .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Восстановление зависимостей
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Сборка решения (включает StyleCop анализ)
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

    - name: Запуск модульных тестов
      run: dotnet test --no-build --verbosity normal

    - name: Сохранение артефактов сборки
      uses: actions/upload-artifact@v4
      with:
        name: CSharpQuizWPF-Build-Artifacts
        path: |
          CSharpQuizWPF/bin/Release/net472/
          CSharpQuizWPF.Tests/bin/Release/net472/
        retention-days: 7