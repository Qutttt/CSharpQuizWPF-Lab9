name: CI/CD Pipeline - CSharpQuizWPF

on:
  push:
    branches: [ "master" ]

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_FILE: 'CSharpQuizWPF.slnx'
  TEST_PROJECT: 'CSharpQuizWPF.Tests/CSharpQuizWPF.Tests.csproj'
  COVERAGE_THRESHOLD: 70

jobs:
  build-and-analyze:
    name: Сборка, Тесты и Покрытие
    runs-on: windows-latest

    steps:
    - name: Получение кода
      uses: actions/checkout@v4

    - name: Настройка .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Восстановление зависимостей
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Сборка и запуск тестов с покрытием
      # Ключевое изменение: убрали --no-build, чтобы coverlet видел правильные пути Release
      run: >
        dotnet test ${{ env.TEST_PROJECT }}
        --configuration Release
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=cobertura
        /p:CoverletOutput=./coverage.xml
        --verbosity normal

    - name: Установка ReportGenerator
      if: always()
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Генерация HTML-отчёта
      if: always()
      run: |
        if (Test-Path ./coverage.xml) {
          reportgenerator -reports:./coverage.xml -targetdir:./coverage-report -reporttypes:HtmlSummary
          Write-Host "✅ Отчёт сгенерирован."
        } else {
          Write-Host "⚠️ Файл coverage.xml не найден. Генерация отчёта пропущена."
        }

    - name: Проверка порога покрытия (Threshold Check)
      if: always()
      run: |
        if (Test-Path ./coverage-report/Summary.json) {
          $summary = Get-Content ./coverage-report/Summary.json | ConvertFrom-Json
          $lineCoverage = $summary.Summary.LineCoverage
          Write-Host "📊 Текущее покрытие строк: $lineCoverage%"
          $threshold = [int]${{ env.COVERAGE_THRESHOLD }}
          if ($lineCoverage -lt $threshold) {
            Write-Error "⛔ ОШИБКА: Покрытие ($lineCoverage%) ниже порога ($threshold%). Пайплайн завершён с ошибкой согласно заданию."
            exit 1
          } else {
            Write-Host "✅ Покрытие соответствует порогу."
          }
        } else {
          Write-Host "⚠️ Отчёт Summary.json не найден. Проверка порога пропущена."
        }

    - name: Сохранение артефактов
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-and-Reports
        path: |
          ./coverage-report/
          CSharpQuizWPF/bin/Release/net472/
        retention-days: 7